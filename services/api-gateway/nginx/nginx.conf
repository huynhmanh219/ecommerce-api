# User context
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # ========================================
  # UPSTREAM SERVICES (service discovery)
  # ========================================
  
  # TẠI SAO upstream?
  # - Load balancing (nếu có multiple instances)
  # - Named reference (dễ update)
  # - Health check
  
  upstream auth_service {
    # auth-service = hostname trong Docker network
    # 3001 = port service listening
    server auth-service:3001;
  }

  upstream product_service {
    server product-service:3002;
  }

  upstream order_service {
    server order-service:3003;
  }

  upstream payment_service {
    server payment-service:3004;
  }

  upstream notification_service {
    server notification-service:3006;
  }

  # ========================================
  # RATE LIMITING
  # ========================================
  
  # TẠI SAO rate limit?
  # - Prevent DDoS
  # - Fair usage (no one user takes all resources)
  # - API protection
  
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

  # ========================================
  # HTTP SERVER
  # ========================================
  
  server {
    listen 3000;
    server_name _;

    # ========================================
    # HEALTH CHECK
    # ========================================
    
    # TẠI SAO /health?
    # - Docker health check
    # - Load balancer health check
    # - Monitoring alert
    
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # ========================================
    # AUTH ROUTES
    # ========================================
    
    location /api/auth/ {
      # Rate limit to 5 requests per minute for login
      limit_req zone=auth_limit burst=10 nodelay;
      
      # Proxy pass to upstream
      proxy_pass http://auth_service;
      
      # TẠI SAO proxy_* headers?
      # - Forward client info to backend
      # - Backend biết real client IP, host, protocol
      # - Required cho logging, analytics
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # PRODUCT ROUTES
    # ========================================
    
    location /api/products/ {
      limit_req zone=general_limit burst=20 nodelay;
      
      proxy_pass http://product_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # ORDER ROUTES
    # ========================================
    
    location /api/orders/ {
      # For authenticated requests (no rate limit, handled by backend)
      limit_req zone=general_limit burst=20 nodelay;
      
      proxy_pass http://order_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Auth header forwarding (important!)
      proxy_pass_request_headers on;
    }

    # ========================================
    # PAYMENT ROUTES
    # ========================================
    
    location /api/payments/ {
      limit_req zone=general_limit burst=10 nodelay;
      
      proxy_pass http://payment_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass_request_headers on;
    }

    # ========================================
    # NOTIFICATION ROUTES
    # ========================================
    
    location /api/notifications/ {
      limit_req zone=general_limit burst=20 nodelay;
      
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass_request_headers on;
    }

    # ========================================
    # FALLBACK - UNKNOWN ROUTES
    # ========================================
    
    location / {
      return 404 '{"error": "Not Found"}';
      add_header Content-Type application/json;
    }
  }
}